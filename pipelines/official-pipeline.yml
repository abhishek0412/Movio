# ──────────────────────────────────────────────────────────────────────
# Official Pipeline — Release & Rollout
# Triggers when changes merge into main.
#
# Stages:
#   Build → Deploy QA (US only, automatic)
#         → Deploy Staging (all regions, on-demand / manual trigger)
#         → Deploy Production (all regions, on-demand / manual trigger)
#
# QA deploys automatically to US after a successful build.
# Staging and Production are on-demand — require manual approval via
# Azure DevOps environment gates.
#
# Multi-regional deployment: Staging and Production deploy to all
# configured regions in parallel (US, EU, APAC).
#
# Environment-specific variables (VITE_API_BASE_URL, etc.) are injected
# via Azure DevOps variable groups: movio-qa, movio-staging, movio-prod.
#
# Region-specific SWA deployment tokens are stored per variable group:
#   AZURE_SWA_DEPLOYMENT_TOKEN_US
#   AZURE_SWA_DEPLOYMENT_TOKEN_EU
#   AZURE_SWA_DEPLOYMENT_TOKEN_APAC
# ──────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main

pr: none

pool:
  vmImage: "ubuntu-latest"

variables:
  NODE_VERSION: "22.x"

stages:
  # ── Build ──────────────────────────────────────────────────────────
  - stage: Build
    displayName: "Build & Test"
    jobs:
      - job: BuildJob
        displayName: "Build"
        steps:
          - task: NodeTool@0
            displayName: "Use Node.js $(NODE_VERSION)"
            inputs:
              versionSpec: "$(NODE_VERSION)"

          - script: npm ci
            displayName: "Install dependencies"

          - script: npm run lint
            displayName: "Lint"

          - script: npm run typecheck
            displayName: "Type check"

          - script: npm run format:check
            displayName: "Format check"

          - script: npm test
            displayName: "Unit tests"

          - script: npm run build
            displayName: "Build"

          - task: PublishPipelineArtifact@1
            displayName: "Publish build artifact"
            inputs:
              targetPath: "dist"
              artifact: "movio-build"
              publishLocation: "pipeline"

  # ── QA (US only — automatic) ───────────────────────────────────────
  - stage: DeployQA
    displayName: "Deploy to QA (US)"
    dependsOn: Build
    condition: succeeded()
    variables:
      - group: movio-qa
    jobs:
      - deployment: DeployQA_US
        displayName: "QA → US"
        environment: "movio-qa"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: "movio-build"

                - task: AzureStaticWebApp@0
                  displayName: "Deploy to Azure Static Web Apps (QA — US)"
                  inputs:
                    app_location: "$(Pipeline.Workspace)/movio-build"
                    skip_app_build: true
                    azure_static_web_apps_api_token: "$(AZURE_SWA_DEPLOYMENT_TOKEN_US)"

  # ── Staging (all regions — on-demand) ──────────────────────────────
  - stage: DeployStaging
    displayName: "Deploy to Staging (all regions)"
    dependsOn: DeployQA
    condition: succeeded()
    variables:
      - group: movio-staging
    jobs:
      - deployment: DeployStaging_US
        displayName: "Staging → US"
        environment: "movio-staging"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: "movio-build"

                - task: AzureStaticWebApp@0
                  displayName: "Deploy to Azure Static Web Apps (Staging — US)"
                  inputs:
                    app_location: "$(Pipeline.Workspace)/movio-build"
                    skip_app_build: true
                    azure_static_web_apps_api_token: "$(AZURE_SWA_DEPLOYMENT_TOKEN_US)"

      - deployment: DeployStaging_EU
        displayName: "Staging → EU"
        dependsOn: []
        environment: "movio-staging"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: "movio-build"

                - task: AzureStaticWebApp@0
                  displayName: "Deploy to Azure Static Web Apps (Staging — EU)"
                  inputs:
                    app_location: "$(Pipeline.Workspace)/movio-build"
                    skip_app_build: true
                    azure_static_web_apps_api_token: "$(AZURE_SWA_DEPLOYMENT_TOKEN_EU)"

      - deployment: DeployStaging_APAC
        displayName: "Staging → APAC"
        dependsOn: []
        environment: "movio-staging"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: "movio-build"

                - task: AzureStaticWebApp@0
                  displayName: "Deploy to Azure Static Web Apps (Staging — APAC)"
                  inputs:
                    app_location: "$(Pipeline.Workspace)/movio-build"
                    skip_app_build: true
                    azure_static_web_apps_api_token: "$(AZURE_SWA_DEPLOYMENT_TOKEN_APAC)"

  # ── Production (all regions — on-demand) ───────────────────────────
  - stage: DeployProduction
    displayName: "Deploy to Production (all regions)"
    dependsOn: DeployStaging
    condition: succeeded()
    variables:
      - group: movio-prod
    jobs:
      - deployment: DeployProduction_US
        displayName: "Production → US"
        environment: "movio-production"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: "movio-build"

                - task: AzureStaticWebApp@0
                  displayName: "Deploy to Azure Static Web Apps (Production — US)"
                  inputs:
                    app_location: "$(Pipeline.Workspace)/movio-build"
                    skip_app_build: true
                    azure_static_web_apps_api_token: "$(AZURE_SWA_DEPLOYMENT_TOKEN_US)"

      - deployment: DeployProduction_EU
        displayName: "Production → EU"
        dependsOn: []
        environment: "movio-production"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: "movio-build"

                - task: AzureStaticWebApp@0
                  displayName: "Deploy to Azure Static Web Apps (Production — EU)"
                  inputs:
                    app_location: "$(Pipeline.Workspace)/movio-build"
                    skip_app_build: true
                    azure_static_web_apps_api_token: "$(AZURE_SWA_DEPLOYMENT_TOKEN_EU)"

      - deployment: DeployProduction_APAC
        displayName: "Production → APAC"
        dependsOn: []
        environment: "movio-production"
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: "movio-build"

                - task: AzureStaticWebApp@0
                  displayName: "Deploy to Azure Static Web Apps (Production — APAC)"
                  inputs:
                    app_location: "$(Pipeline.Workspace)/movio-build"
                    skip_app_build: true
                    azure_static_web_apps_api_token: "$(AZURE_SWA_DEPLOYMENT_TOKEN_APAC)"
